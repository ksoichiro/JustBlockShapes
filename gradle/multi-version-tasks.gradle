// Multi-version build tasks
// Defines custom Gradle tasks for building the mod across multiple Minecraft versions.

def supportedVersions = ['1.21.1', '1.21.3', '1.21.4', '1.21.5', '1.21.6', '1.21.7', '1.21.8', '1.21.9', '1.21.10', '1.21.11', '1.20.1']
def taskGroup = 'mod build'

// ============================================================
// Clean Tasks
// ============================================================

supportedVersions.each { version ->
    def versionSuffix = version.replace('.', '_')

    tasks.register("clean${versionSuffix}") {
        group = taskGroup
        description = "Clean build outputs for Minecraft ${version}"

        doLast {
            project.exec {
                commandLine './gradlew', 'clean', "-Ptarget_mc_version=${version}"
            }
        }
    }
}

tasks.register('cleanAll') {
    group = taskGroup
    description = "Clean build outputs for all supported Minecraft versions (${supportedVersions.join(', ')})"

    doLast {
        supportedVersions.each { version ->
            logger.lifecycle(">>> Cleaning for Minecraft ${version}...")

            project.exec {
                commandLine './gradlew', 'clean', "-Ptarget_mc_version=${version}"
            }
        }

        logger.lifecycle('')
        logger.lifecycle('All versions cleaned successfully.')
    }
}

// ============================================================
// Build Tasks
// ============================================================

supportedVersions.each { version ->
    def versionSuffix = version.replace('.', '_')

    tasks.register("build${versionSuffix}") {
        group = taskGroup
        description = "Build mod for Minecraft ${version}"

        doFirst {
            logger.lifecycle('')
            logger.lifecycle('====================================')
            logger.lifecycle("Building for Minecraft ${version}...")
            logger.lifecycle('====================================')
            logger.lifecycle('')
        }

        doLast {
            project.exec {
                commandLine './gradlew', 'clean', 'build', "-Ptarget_mc_version=${version}", '-x', 'test'
            }
        }
    }
}

tasks.register('buildAll') {
    group = taskGroup
    description = "Build mod for all supported Minecraft versions (${supportedVersions.join(', ')})"

    doFirst {
        logger.lifecycle('')
        logger.lifecycle('====================================================')
        logger.lifecycle('Building for ALL supported Minecraft versions...')
        logger.lifecycle("Versions: ${supportedVersions.join(', ')}")
        logger.lifecycle('====================================================')
        logger.lifecycle('')
    }

    doLast {
        def failed = []

        supportedVersions.each { version ->
            logger.lifecycle('')
            logger.lifecycle(">>> Building for Minecraft ${version}...")
            logger.lifecycle('')

            try {
                project.exec {
                    commandLine './gradlew', 'clean', 'build', "-Ptarget_mc_version=${version}", '-x', 'test'
                    errorOutput = System.err
                }
                logger.lifecycle("SUCCESS: Minecraft ${version}")
            } catch (Exception e) {
                logger.error("FAILED: Minecraft ${version}")
                failed.add(version)
            }
        }

        logger.lifecycle('')
        logger.lifecycle('====================================================')
        logger.lifecycle('Build Summary:')
        logger.lifecycle('====================================================')

        if (failed.isEmpty()) {
            logger.lifecycle('All versions built successfully!')
            supportedVersions.each { version ->
                logger.lifecycle("   - Minecraft ${version}")
            }
        } else {
            logger.lifecycle("${failed.size()} version(s) failed:")
            failed.each { version ->
                logger.lifecycle("   - Minecraft ${version}")
            }
            throw new GradleException("Build failed for: ${failed.join(', ')}")
        }

        logger.lifecycle('====================================================')
        logger.lifecycle('')
    }
}

// ============================================================
// Collect Release JARs
// ============================================================

tasks.register('release') {
    group = taskGroup
    description = "Clean, build all versions, and collect release JARs"

    doLast {
        ['cleanAll', 'buildAll', 'collectJars'].each { taskName ->
            project.exec {
                commandLine './gradlew', taskName
            }
        }
    }
}

// ============================================================
// GameTest Tasks
// ============================================================

tasks.register('gameTestAll') {
    group = taskGroup
    description = "Run GameTests for all supported 1.21.x Minecraft versions (Fabric + NeoForge)"

    doFirst {
        logger.lifecycle('')
        logger.lifecycle('====================================================')
        logger.lifecycle('Running GameTests for ALL supported 1.21.x versions...')
        logger.lifecycle('====================================================')
        logger.lifecycle('')
    }

    doLast {
        // Each entry: [version, [list of tasks]]
        // NeoForge GameTest is not available for 1.21.9+ (NeoForge launch.cfg missing launchTarget)
        def versionGroups = [
            [version: '1.21.1', tasks: [':fabric:runGameTest', ':neoforge:runGameTestServer']],
            [version: '1.21.3', tasks: [':fabric:runGameTest', ':neoforge:runGameTestServer']],
            [version: '1.21.4', tasks: [':fabric:runGameTest', ':neoforge:runGameTestServer']],
            [version: '1.21.5', tasks: [':fabric:runGameTest', ':neoforge:runGameTestServer']],
            [version: '1.21.6', tasks: [':fabric:runGameTest', ':neoforge:runGameTestServer']],
            [version: '1.21.7', tasks: [':fabric:runGameTest', ':neoforge:runGameTestServer']],
            [version: '1.21.8', tasks: [':fabric:runGameTest', ':neoforge:runGameTestServer']],
            [version: '1.21.9', tasks: [':fabric:runGameTest']],
            [version: '1.21.10', tasks: [':fabric:runGameTest']],
            [version: '1.21.11', tasks: [':fabric:runGameTest']],
        ]

        def passed = java.util.Collections.synchronizedList([])
        def failed = java.util.Collections.synchronizedList([])

        def gradlew = new File(projectDir, 'gradlew').absolutePath
        def logDir = new File(projectDir, 'build')
        logDir.mkdirs()

        def maxParallel = 2
        def executor = java.util.concurrent.Executors.newFixedThreadPool(maxParallel)
        def futures = []

        versionGroups.each { group ->
            def version = group.version
            def taskList = group.tasks

            def future = executor.submit({
                taskList.each { taskName ->
                    def platform = taskName.contains('neoforge') ? 'neoforge' : 'fabric'
                    def label = platform + ' ' + version

                    def cmd = [
                        gradlew, taskName,
                        '-Ptarget_mc_version=' + version,
                        '--project-cache-dir', '.gradle/gametest-' + version,
                        '--stacktrace'
                    ]

                    def logFile = new File(logDir, 'gametest-' + platform + '-' + version + '.log')

                    // Clean stale world directories to avoid session.lock conflicts
                    def worldDir = new File(projectDir, platform + '/' + version + '/run/world')
                    if (worldDir.exists()) {
                        worldDir.deleteDir()
                    }
                    // Also clean gametestserver world for NeoForge 1.21.5+
                    def gametestWorldDir = new File(projectDir, platform + '/' + version + '/run/gametestserver')
                    if (gametestWorldDir.exists()) {
                        gametestWorldDir.deleteDir()
                    }

                    try {
                        def pb = new ProcessBuilder(cmd)
                        pb.directory(projectDir)
                        pb.redirectErrorStream(true)
                        pb.redirectOutput(logFile)

                        def process = pb.start()
                        def exitCode = process.waitFor()

                        if (exitCode == 0) {
                            passed.add(label)
                        } else {
                            failed.add(label + ' (see ' + logFile.absolutePath + ')')
                        }
                    } catch (Exception e) {
                        failed.add(label + ' (' + e.message + ')')
                    }
                }
            } as Runnable)
            futures.add(future)
        }

        futures.each { it.get() }
        executor.shutdown()

        logger.lifecycle('')
        logger.lifecycle('====================================================')
        logger.lifecycle('GameTest Summary:')
        logger.lifecycle('====================================================')

        passed.sort().each { label ->
            logger.lifecycle("   PASSED: ${label}")
        }
        failed.sort().each { entry ->
            logger.lifecycle("   FAILED: ${entry}")
        }

        logger.lifecycle('')
        logger.lifecycle("Total: ${passed.size()} passed, ${failed.size()} failed")
        logger.lifecycle("Logs: ${logDir.absolutePath}/gametest-*.log")
        logger.lifecycle('====================================================')
        logger.lifecycle('')

        if (!failed.isEmpty()) {
            throw new GradleException("GameTests failed for: ${failed.collect { it.split(' \\(')[0] }.join(', ')}")
        }
    }
}

tasks.register('collectJars') {
    group = taskGroup
    description = "Collect release JARs from all versions into build/release/"

    doLast {
        def releaseDir = file("${rootDir}/build/release")
        if (releaseDir.exists()) {
            releaseDir.deleteDir()
        }
        releaseDir.mkdirs()

        def collected = []

        supportedVersions.each { version ->
            def propsFile = file("${rootDir}/props/${version}.properties")
            def props = new Properties()
            propsFile.withInputStream { props.load(it) }

            def platforms = props.getProperty('enabled_platforms', '').split(',').collect { it.trim() }

            platforms.each { platform ->
                def libsDir = file("${rootDir}/${platform}/${version}/build/libs")
                if (!libsDir.exists()) {
                    logger.warn("SKIP: ${libsDir} does not exist (not built yet?)")
                    return
                }

                def archivesName = project.property('archives_name')
                def modVersion = project.property('mod_version')
                def jarName = "${archivesName}-${modVersion}+${version}-${platform}.jar"
                def jarFile = new File(libsDir, jarName)

                if (jarFile.exists()) {
                    ant.copy(file: jarFile, todir: releaseDir)
                    collected.add(jarName)
                    logger.lifecycle("Collected: ${jarName}")
                } else {
                    logger.warn("NOT FOUND: ${jarFile}")
                }
            }
        }

        logger.lifecycle('')
        if (collected.isEmpty()) {
            logger.warn('No release JARs found. Run buildAll first.')
        } else {
            logger.lifecycle("${collected.size()} JAR(s) collected into build/release/")
        }
    }
}
