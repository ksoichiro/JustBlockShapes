plugins {
    id 'net.neoforged.moddev'
}

neoForge {
    version = neoforge_version

    runs {
        client {
            client()
        }
    }

    mods {
        justblockshapes {
            sourceSet sourceSets.main
        }
    }
}

configurations {
    commonJava {
        canBeResolved = true
    }
    commonResources {
        canBeResolved = true
    }
}

dependencies {
    compileOnly project(':common')

    commonJava project(path: ':common', configuration: 'commonJava')
    commonResources project(path: ':common', configuration: 'commonResources')
}

sourceSets {
    main {
        java {
            srcDir '../1.21.5/src/main/java'
            srcDir 'src/main/java'
        }
        resources {
            srcDirs = []
            // Version-specific resources FIRST (higher priority)
            srcDir 'src/main/resources'
            // Shared resources SECOND (lower priority)
            srcDir '../base/src/main/resources'
        }
    }
}

// Add base sources excluding classes that have version-specific overrides
tasks.named('compileJava') {
    dependsOn configurations.commonJava
    source configurations.commonJava
    source fileTree('../base/src/main/java') {
        exclude 'com/justblockshapes/neoforge/JustBlockShapesNeoForge.java'
        exclude 'com/justblockshapes/neoforge/gametest/**'
    }
}

tasks.named('processResources') {
    dependsOn configurations.commonResources
    from configurations.commonResources
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    inputs.property 'version', project.version

    filesMatching('META-INF/neoforge.mods.toml') {
        expand 'version': project.version
    }
}

jar {
    archiveBaseName = rootProject.archives_name
    archiveVersion = "${rootProject.mod_version}+${minecraft_version}-neoforge"
    archiveClassifier = null
}

sourcesJar {
    archiveBaseName = rootProject.archives_name
    archiveVersion = "${rootProject.mod_version}+${minecraft_version}-neoforge"
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

publishing {
    publications {
        mavenNeoForge(MavenPublication) {
            artifactId = "${rootProject.archives_name}-neoforge"
            from components.java
        }
    }

    repositories {
    }
}
